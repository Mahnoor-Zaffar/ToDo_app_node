<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management Dashboard</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Quill Rich Text Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Apex</h2>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Admin+User&background=random" alt="Avatar" class="avatar" id="current-user-avatar">
          <span id="current-user-name">Loading...</span>
        </div>
      </div>
      <div class="nav-section" style="margin-bottom: 2rem;">
        <div class="nav-item active" id="view-today">
          <span class="icon">📅</span> Today
        </div>
        <div class="nav-item">
          <span class="icon">🗓️</span> Upcoming
        </div>
      </div>
      <div class="nav-section">
        <h3>Projects</h3>
        <div id="sidebar-projects"></div>
      </div>
      <div class="nav-footer">
        <button id="new-project-btn" class="secondary-btn" style="width:100%; padding:0.5rem; margin-top:2rem; border-radius:8px; border:1px solid var(--border-color); cursor:pointer;">New Project</button>
      </div>
    </aside>
    
    <!-- Central Pane -->
    <main class="main-pane">
      <div class="main-header">
        <div class="header-left">
          <h1 id="main-header-title">Today's Focus</h1>
        </div>
        <div class="header-right">
          <div id="presence-avatars" class="presence-avatars"></div>
          <button class="icon-btn" id="toggle-view-btn">◫</button>
        </div>
      </div>
      <div class="quick-add">
        <input type="text" id="quick-add-input" aria-label="Quick add new task" placeholder="Add a task or search (Cmd+K)..." autocomplete="off">
      </div>
      
      <div class="main-content" id="main-content-area">
        <!-- List View -->
        <div id="list-view" class="view-container"></div>
        
        <!-- Kanban View -->
        <div id="kanban-view" class="view-container" style="display: none;">
          <div class="kanban-column">
            <h3>To Do</h3>
            <div class="kanban-dropzone" data-status="todo"></div>
          </div>
          <div class="kanban-column">
            <h3>In Progress</h3>
            <div class="kanban-dropzone" data-status="in-progress"></div>
          </div>
          <div class="kanban-column">
            <h3>Done</h3>
            <div class="kanban-dropzone" data-status="done"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Drawer -->
    <aside class="right-drawer" id="right-drawer">
      <div class="drawer-header">
        <div class="drawer-actions">
          <button class="icon-btn" id="close-drawer" aria-label="Close task details drawer">&times;</button>
        </div>
        <div class="drawer-actions">
          <button class="icon-btn" id="delete-task-btn">🗑️</button>
        </div>
      </div>
      <div class="drawer-content">
        <h2 id="task-title-display" class="task-title">Task Title</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority" class="select-light">
              <option value="P1">Urgent</option>
              <option value="P2">High</option>
              <option value="P3">Medium</option>
              <option value="P4">Low</option>
              <option value="P5">None</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="task-status" class="select-light">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-duedate" class="input-light">
        </div>
        
        <div class="form-group">
          <label>Notes</label>
          <div id="quill-editor" class="rich-text-editor"></div>
        </div>
        
        <div class="form-group">
          <label>Attachments</label>
          <div class="upload-zone">
            <input type="file" id="task-attachment" class="file-hidden">
            <label for="task-attachment" class="upload-btn">☁️ Upload File</label>
          </div>
          <div id="attachment-list" class="attachment-list"></div>
        </div>
      </div>
    </aside>
  </div>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
